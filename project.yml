name: Ownly
options:
  bundleIdPrefix: com.ownly
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: "2.0.0"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm.git
    from: "5.0.0"
targets:
  Ownly:
    type: application
    platform: iOS
    sources:
      - path: Ownly
        excludes:
          - "**/*.test.swift"
    resources:
      - path: Ownly/Resources/Assets.xcassets
      - path: Ownly/Resources/Localization
    dependencies:
      - package: Supabase
        product: Supabase
      - package: RevenueCat
        product: RevenueCat
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ownly.app
        PRODUCT_NAME: Ownly
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE: true
        SWIFT_EMIT_LOC_STRINGS: true
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: Ownly/App/Info.plist

  OwnlyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OwnlyTests
        optional: true
    dependencies:
      - target: Ownly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ownly.app.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Ownly.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Ownly"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  Ownly:
    build:
      targets:
        Ownly: all
        OwnlyTests: [test]
    run:
      config: Debug
      commandLineArguments:
        "-com.apple.CoreData.ConcurrencyDebug 1": false
    test:
      config: Debug
      targets:
        - OwnlyTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
